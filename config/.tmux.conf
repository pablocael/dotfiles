# ----------------------------
# Prefix
# ----------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ----------------------------
# Basic behavior
# ----------------------------
set -g mouse on
set -g mode-keys vi
set -g default-terminal "tmux-256color"

# Vim-style selection in copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ----------------------------
# Your shortcuts
# ----------------------------
bind t new-window -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Optional: resize panes with Shift + hjkl after prefix
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ----------------------------
# Clock
# ----------------------------
bind T clock-mode
set -g clock-mode-style 24

# ----------------------------
# Status bar
# ----------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 150
set -g status-left ""

# ----------------------------
# Plugins
# ----------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ----------------------------
# Catppuccin theme
# ----------------------------
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Status modules
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right " | %H:%M %d-%b "

# ----------------------------
# TPM init
# Keep this at the very bottom
# ----------------------------
run '~/.tmux/plugins/tpm/tpm'

set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "

# Replace the default tmux-cpu symbols
set -g @cpu_low_icon ""
set -g @cpu_medium_icon ""
set -g @cpu_high_icon ""

# Remove the icon before window numbers/tabs
set -g @catppuccin_window_status "text"

set -g @catppuccin_window_status_enable "yes"
set -g @catppuccin_window_status_icon_enable "no"

set -g @catppuccin_icon_window_current ""
set -g @catppuccin_icon_window_last ""
set -g @catppuccin_icon_window_zoom ""
set -g @catppuccin_icon_window_mark ""
set -g @catppuccin_icon_window_silent ""
set -g @catppuccin_icon_window_activity ""
set -g @catppuccin_icon_window_bell ""
