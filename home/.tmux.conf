# ----------------------------
# Prefix
# ----------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ----------------------------
# Basic behavior
# ----------------------------
set -g mouse on
set -g mode-keys vi
set -g default-terminal "tmux-256color"

# Vim-style selection in copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ----------------------------
# Your shortcuts
# ----------------------------
bind t new-window -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Optional: resize panes with Shift + hjkl after prefix
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ----------------------------
# Clock
# ----------------------------
bind T clock-mode
set -g clock-mode-style 24

# ----------------------------
# Status bar
# ----------------------------
# ---------- simple native status bar ----------
set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"

set -g status-left-length 20
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[default]"

set -g window-status-separator ""
set -g window-status-format "#[fg=#bac2de,bg=#313244]  #I:#W  #[default]"
set -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold]  #I:#W  #[default]"

set -g status-right-length 30
set -g status-right "#[fg=#1e1e2e,bg=#f9e2af,bold] %H:%M #[fg=#1e1e2e,bg=#89dceb] %d-%b #[default]"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'

bind-key f display-popup \
  -E -w 80% -h 50% -x C -y C \
  "bash $HOME/.local/bin/tmux-switcher"

# TPM must be last
run '~/.tmux/plugins/tpm/tpm'
